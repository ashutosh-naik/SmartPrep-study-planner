<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Graduation cap (mortarboard) - top flat square part -->
  <polygon points="32,14 52,24 32,34 12,24" fill="white"/>
  <!-- Cap brim / tassel string going down right -->
  <line x1="52" y1="24" x2="52" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tassel dot -->
  <circle cx="52" cy="37.5" r="2.5" fill="white"/>
  <!-- Cap body / hood going down both sides -->
  <path d="M18,27 Q18,42 32,46 Q46,42 46,27 L32,34 Z" fill="white"/>
</svg>
