# ===== SmartPrep Application Configuration =====

# Server
server.port=${SERVER_PORT:8081}

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/smartprep_db
spring.datasource.username=postgres
spring.datasource.password=Post@69
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=smartprep_super_secret_key_2024_adaptive_study_planner_exam_analytics
jwt.expiration=86400000

# Google OAuth
google.client.id=494979891642-rl8k3c5q9h7ilu3ub64gnh8ujvnd64ro.apps.googleusercontent.com

# Logging
logging.level.com.smartprep=DEBUG
logging.level.org.springframework.security=DEBUG

# ===== Cache (Using simple in-memory cache to avoid Redis dependency locally) =====
# spring.data.redis.host=localhost
# spring.data.redis.port=6379
spring.cache.type=simple

# ===== Java 21 — Virtual Threads (Project Loom) =====
spring.threads.virtual.enabled=true

# Capture errors to file
logging.file.name=application.log
logging.level.org.hibernate.SQL=DEBUG
